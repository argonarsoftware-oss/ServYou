name: Generate Keystore

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate signing keystore
        run: |
          keytool -genkeypair \
            -alias servyou \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore servyou-release.jks \
            -storepass ServYou2026Release \
            -keypass ServYou2026Release \
            -dname "CN=ServYou, OU=Mobile, O=Argonar Software, L=Cebu, ST=Cebu, C=PH"

      - name: Base64 encode keystore
        id: encode
        run: |
          base64 -w 0 servyou-release.jks > keystore_base64.txt
          echo "KEYSTORE_BASE64=$(cat keystore_base64.txt)" >> $GITHUB_OUTPUT
          echo ""
          echo "=== COPY THESE VALUES TO GITHUB SECRETS ==="
          echo "KEYSTORE_BASE64: (see artifact)"
          echo "KEYSTORE_PASSWORD: ServYou2026Release"
          echo "KEY_ALIAS: servyou"
          echo "KEY_PASSWORD: ServYou2026Release"

      - name: Upload keystore base64
        uses: actions/upload-artifact@v4
        with:
          name: keystore-base64
          path: keystore_base64.txt
          retention-days: 1
